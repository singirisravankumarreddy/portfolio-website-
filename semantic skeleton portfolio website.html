<body>

    <a href="#main-content" style="position: absolute; left: -9999px;">Skip to main content</a>

    <header>

        <section aria-labelledby="intro-heading">
            <h1 id="intro-heading">Hi, I'm SRAVAN KUMAR REDDY</h1>
            <p>Welcome to my accessible, semantically structured portfolio.</p>
        </section>

        <section aria-labelledby="contact-heading">
            <h2 id="contact-heading">Get in Touch</h2>

            <form action="/submit-endpoint" method="POST">

                <div style="margin-bottom: 1rem;">
                    <label for="user-name">Full Name:</label><br>
                    <input type="text" id="user-name" name="name" required aria-required="true">
                </div>

                <div style="margin-bottom: 1rem;">
                    <label for="user-email">Email Address:</label><br>
                    <input type="email" id="user-email" name="email" required aria-required="true">
                </div>

                <div style="margin-bottom: 1rem;">
                    <label for="user-message">Message:</label><br>
                    <textarea id="user-message" name="message" rows="5" required aria-required="true"></textarea>
                </div>

                <button type="submit">Send Message</button>
            </form>
        </section>

    </main>
